# SAMEasy - SAME alert monitor (Docker, headless, no e-ink)
# Requires RTL-SDR USB device passthrough.

services:
  sameasy:
    build: .
    image: sameasy:latest
    container_name: sameasy
    restart: unless-stopped
    # --- RTL-SDR USB passthrough (required) ---
    # Set RTL_DEVICE on the host to your device (e.g. export RTL_DEVICE=/dev/bus/usb/003/004).
    # Find with: lsusb then ls /dev/bus/usb/BUS/DEV
    # Unraid: Docker UI → Add Device → /dev/bus/usb/001/002 (use your bus/device from lsusb).
    devices:
      - ${RTL_DEVICE:-/dev/bus/usb/001/002}:/dev/bus/usb/001/002
    # Option B: If the above fails, some hosts use:
    #   privileged: true
    #   (less secure; prefer passing the single device when possible.)
    # --- Alerts API (NWS-like for WX script fallback) ---
    ports:
      - "5000:5000"
    # --- Persist database and logs ---
    volumes:
      - sameasy_runtime:/app/runtime
    # --- Optional tuning and retry (NOAA weather radio default: 162.4 MHz) ---
    environment:
      - SAMEASY_FREQ=162.4M
      - SAMEASY_GAIN=29
      - SAMEASY_PPM=-35
      - SAMEASY_RETRY_DELAY=5
      # - SAMEASY_MAX_RETRIES=   # unset = retry forever on device drop

volumes:
  sameasy_runtime:
